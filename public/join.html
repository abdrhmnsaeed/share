<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="session-token" content="__SESSION_TOKEN__" />
  <meta name="room-id" content="__ROOM_ID__" />
  <title>LAN Drop — Room</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
  <script src="/pwa-register.js" defer></script>
  <style>
    :root { font-family: system-ui, -apple-system, sans-serif; background: #0f1419; color: #e7e9ea; }
    body { max-width: 28rem; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.2rem; font-weight: 600; }
    .zone {
      border: 2px dashed #536471; border-radius: 12px; padding: 2rem 1rem;
      text-align: center; margin: 1rem 0; background: #1a2330;
    }
    .zone.drag { border-color: #1d9bf0; background: #15202b; }
    input[type="file"] { width: 100%; margin-top: 0.75rem; }
    #log { font-size: 0.85rem; color: #8b98a5; margin-top: 1rem; white-space: pre-wrap; word-break: break-word; }
    .ok { color: #00ba7c; }
    .err { color: #f4212e; }
    button, .btnlink {
      cursor: pointer; background: #1d9bf0; color: #fff; border: 0;
      padding: 0.45rem 0.75rem; border-radius: 8px; font-size: 0.9rem; margin-top: 0.35rem;
      text-decoration: none; display: inline-block;
    }
    button.secondary, .btnlink.secondary { background: #38444d; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    h2 { font-size: 1rem; font-weight: 600; margin: 1.25rem 0 0.5rem; }
    textarea {
      width: 100%; min-height: 6rem; box-sizing: border-box; padding: 0.65rem;
      border-radius: 8px; border: 1px solid #536471; background: #15202b; color: #e7e9ea;
      font-size: 1rem; resize: vertical;
    }
    .textbox { margin: 0.5rem 0 0; }
    .back { margin-bottom: 1rem; }
    .back a { color: #1d9bf0; text-decoration: none; font-size: 0.9rem; }
    #browse li { margin: 0.4rem 0; display: flex; align-items: center; gap: 0.45rem; flex-wrap: wrap; font-size: 0.9rem; }
    #browse .fname { flex: 1; min-width: 0; word-break: break-all; }
    .box { background: #1a2330; border-radius: 10px; padding: 0.85rem 1rem; margin: 1rem 0; }
    #expiry { font-size: 0.85rem; color: #ffad1f; margin: 0.25rem 0 0; }
  </style>
</head>
<body>
  <p class="back"><a href="/">← Home</a></p>
  <h1>Room</h1>
  <p id="expiry" aria-live="polite"></p>

  <div class="box">
    <h2 style="margin-top:0">Shared in this room</h2>
    <p class="muted" style="font-size:0.85rem;color:#8b98a5;margin:0 0 0.5rem;">Download files or copy text. Everything disappears when the room expires (~1 hour).</p>
    <button type="button" class="secondary" id="refreshBrowse" style="width:auto;margin-bottom:0.5rem">Refresh</button>
    <ul id="browse" style="list-style:none;padding:0;margin:0"></ul>
  </div>

  <h2>Add text</h2>
  <p class="muted" style="font-size:0.85rem;color:#8b98a5;margin:0 0 0.5rem;">Saved as a file on the server until the room expires.</p>
  <div class="textbox">
    <textarea id="txt" placeholder="Paste or type here…" autocomplete="off"></textarea>
    <p><button type="button" id="sendText">Send text</button></p>
  </div>

  <h2>Add files</h2>
  <div class="zone" id="zone">
    <p>Choose files or tap below</p>
    <input type="file" id="f" multiple />
    <p><button type="button" id="send" disabled>Upload</button></p>
  </div>
  <div id="log"></div>
  <script>
    const TOKEN = document.querySelector('meta[name="session-token"]').getAttribute('content');
    const ROOM_ID = document.querySelector('meta[name="room-id"]').getAttribute('content');
    const API = '/api/rooms/' + encodeURIComponent(ROOM_ID);

    const zone = document.getElementById('zone');
    const input = document.getElementById('f');
    const send = document.getElementById('send');
    const sendText = document.getElementById('sendText');
    const txt = document.getElementById('txt');
    const log = document.getElementById('log');
    const browse = document.getElementById('browse');

    function msg(text, cls) {
      const span = document.createElement('div');
      span.className = cls || '';
      span.textContent = text;
      log.appendChild(span);
    }

    function fmtBytes(n) {
      if (n < 1024) return n + ' B';
      if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
      return (n / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function fileUrl(name) {
      return API + '/file/' + encodeURIComponent(name) + '?token=' + encodeURIComponent(TOKEN);
    }

    async function loadExpiry() {
      const r = await fetch(API + '/info?token=' + encodeURIComponent(TOKEN));
      const j = await r.json().catch(() => ({}));
      const el = document.getElementById('expiry');
      if (j.expiresAt) {
        const left = Math.max(0, j.expiresAt - Date.now());
        const m = Math.floor(left / 60000);
        const s = Math.floor((left % 60000) / 1000);
        el.textContent = 'Room closes in about ' + m + 'm ' + s + 's';
      } else {
        el.textContent = '';
      }
    }

    async function loadBrowse() {
      const r = await fetch(API + '/received?token=' + encodeURIComponent(TOKEN));
      const j = await r.json().catch(() => ({}));
      browse.innerHTML = '';
      const files = j.files || [];
      if (files.length === 0) {
        const li = document.createElement('li');
        li.className = 'muted';
        li.style.color = '#8b98a5';
        li.textContent = 'Nothing here yet';
        browse.appendChild(li);
        return;
      }
      for (const f of files) {
        const name = typeof f === 'string' ? f : f.name;
        const size = typeof f === 'object' && f.size != null ? f.size : 0;
        const isText = typeof f === 'object' && f.isText;
        const li = document.createElement('li');
        const span = document.createElement('span');
        span.className = 'fname';
        span.textContent = name + ' (' + fmtBytes(size) + ')';
        li.appendChild(span);
        const a = document.createElement('a');
        a.className = 'btnlink';
        a.href = fileUrl(name);
        a.target = '_blank';
        a.rel = 'noopener';
        a.textContent = 'Download';
        li.appendChild(a);
        if (isText) {
          const c = document.createElement('button');
          c.type = 'button';
          c.className = 'secondary';
          c.textContent = 'Copy text';
          c.onclick = async () => {
            const tr = await fetch(fileUrl(name));
            const tx = await tr.text();
            await navigator.clipboard.writeText(tx);
            c.textContent = 'Copied';
            setTimeout(() => { c.textContent = 'Copy text'; }, 2000);
          };
          li.appendChild(c);
        }
        browse.appendChild(li);
      }
    }

    document.getElementById('refreshBrowse').addEventListener('click', () => {
      loadBrowse();
      loadExpiry();
    });

    input.addEventListener('change', () => {
      send.disabled = !input.files || input.files.length === 0;
    });

    ['dragenter', 'dragover'].forEach((ev) => {
      zone.addEventListener(ev, (e) => {
        e.preventDefault();
        zone.classList.add('drag');
      });
    });
    ['dragleave', 'drop'].forEach((ev) => {
      zone.addEventListener(ev, (e) => {
        e.preventDefault();
        zone.classList.remove('drag');
      });
    });
    zone.addEventListener('drop', (e) => {
      if (e.dataTransfer.files.length) {
        input.files = e.dataTransfer.files;
        send.disabled = false;
      }
    });

    sendText.addEventListener('click', async () => {
      const text = (txt.value || '').trim();
      if (!text) {
        msg('Type or paste something first.', 'err');
        return;
      }
      sendText.disabled = true;
      try {
        const r = await fetch(API + '/text', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-Session-Token': TOKEN,
          },
          body: JSON.stringify({ token: TOKEN, text }),
        });
        const j = await r.json().catch(() => ({}));
        if (!r.ok) {
          msg(j.error || ('HTTP ' + r.status), 'err');
        } else {
          msg('Saved.', 'ok');
          txt.value = '';
          loadBrowse();
        }
      } catch (e) {
        msg(String(e.message || e), 'err');
      }
      sendText.disabled = false;
    });

    send.addEventListener('click', async () => {
      if (!input.files || !input.files.length) return;
      send.disabled = true;
      log.innerHTML = '';
      const fd = new FormData();
      fd.append('token', TOKEN);
      for (let i = 0; i < input.files.length; i++) {
        fd.append('files', input.files[i]);
      }
      try {
        const r = await fetch(API + '/upload', {
          method: 'POST',
          headers: { 'X-Session-Token': TOKEN },
          body: fd,
        });
        const j = await r.json().catch(() => ({}));
        if (!r.ok) {
          msg(j.error || ('HTTP ' + r.status), 'err');
        } else {
          msg('Uploaded.', 'ok');
          loadBrowse();
        }
      } catch (e) {
        msg(String(e.message || e), 'err');
      }
      send.disabled = !input.files || input.files.length === 0;
    });

    loadBrowse();
    loadExpiry();
    setInterval(loadExpiry, 5000);
    setInterval(loadBrowse, 12000);
  </script>
</body>
</html>
